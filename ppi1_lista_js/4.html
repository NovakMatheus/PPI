<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteio de Números</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:30px;
}

input{
    width:100px;
    padding:8px;
    margin:5px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#resultado{
    font-size:20px;
    font-weight:bold;
    color:blue;
}

ul{
    margin-top:20px;
}

li{
    margin:5px 0;
}

</style>
</head>

<body>

<h1>Sorteio de Números</h1>

<label>Mínimo:</label>
<input type="number" id="minimo" value="1">

<label>Máximo:</label>
<input type="number" id="maximo" value="100">

<br><br>

<button onclick="sortear()">Sortear</button>

<p id="resultado"></p>

<h2>Histórico de Sorteios</h2>

<ul id="lista"></ul>

<script>

let sorteios = [];

function sortear(){

    let minimo = parseInt(document.getElementById("minimo").value);
    let maximo = parseInt(document.getElementById("maximo").value);

    if(isNaN(minimo) || isNaN(maximo)){
        alert("Informe o intervalo.");
        return;
    }

    if(minimo > maximo){
        alert("O valor mínimo deve ser menor ou igual ao máximo.");
        return;
    }

    let numero = Math.floor(Math.random() * (maximo - minimo + 1)) + minimo;

    document.getElementById("resultado").innerText =
    "Número sorteado: " + numero;

    let encontrado = false;

    for(let i=0;i<sorteios.length;i++){

        if(sorteios[i].numero == numero){

            sorteios[i].vezes++;
            encontrado = true;
            break;
        }

    }

    if(!encontrado){

        sorteios.push({
            numero:numero,
            vezes:1
        });

    }

    atualizarLista();

}

function atualizarLista(){

    let lista = document.getElementById("lista");

    lista.innerHTML = "";

    for(let i=0;i<sorteios.length;i++){

        let item = document.createElement("li");

        item.innerText =
        "Número " + sorteios[i].numero +
        " - sorteado " + sorteios[i].vezes + " vez(es)";

        lista.appendChild(item);

    }

}

</script>

</body>
</html>
