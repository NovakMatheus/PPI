<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Números Primos</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin: 30px;
}

input{
    padding:8px;
    width:120px;
    margin:5px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#resultadoPrimos{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    background:#f2f2f2;
    min-height:50px;
}

</style>

</head>

<body>

<h1>Verificador de Números Primos</h1>

<label>Número Inicial:</label>
<input type="number" id="inicio">

<label>Número Final:</label>
<input type="number" id="fim">

<br><br>

<button onclick="verificarPrimos()">Verificar</button>

<div id="resultadoPrimos"></div>

<script>

function ehPrimo(numero){

    if(numero < 2){
        return false;
    }

    for(let i = 2; i <= Math.sqrt(numero); i++){

        if(numero % i == 0){
            return false;
        }

    }

    return true;
}

function verificarPrimos(){

    let inicio = parseInt(document.getElementById("inicio").value);
    let fim = parseInt(document.getElementById("fim").value);

    if(isNaN(inicio) || isNaN(fim)){
        alert("Preencha os dois campos.");
        return;
    }

    if(inicio > fim){
        alert("O número inicial deve ser menor ou igual ao número final.");
        return;
    }

    let resultado = "";

    for(let i = inicio; i <= fim; i++){

        if(ehPrimo(i)){
            resultado += i + " ";
        }

    }

    if(resultado == ""){
        resultado = "Nenhum número primo encontrado no intervalo.";
    }

    document.getElementById("resultadoPrimos").innerText = resultado;

}

</script>

</body>
</html>
