<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cores Aleatórias</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffffff;
    font-family:Arial, sans-serif;
}

.container{
    display:flex;
    width:100%;
    height:200px;
}

.cor{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    padding-bottom:20px;
    font-size:22px;
    font-weight:bold;
    color:black;
}

</style>
</head>

<body>

<div class="container">

    <div class="cor"></div>
    <div class="cor"></div>
    <div class="cor"></div>
    <div class="cor"></div>
    <div class="cor"></div>

</div>

<script>

const caixas = document.querySelectorAll(".cor");

function corAleatoria(){

    let caracteres = "0123456789ABCDEF";
    let cor = "#";

    for(let i = 0; i < 6; i++){
        cor += caracteres[Math.floor(Math.random()*16)];
    }

    return cor;
}

function atualizarCores(){

    caixas.forEach(function(caixa){

        let cor = corAleatoria();

        caixa.style.backgroundColor = cor;
        caixa.innerText = cor.substring(1);

    });

}

atualizarCores();

document.addEventListener("keydown", function(event){

    if(event.code === "Space"){
        event.preventDefault();
        atualizarCores();
    }

});

</script>

</body>
</html>
