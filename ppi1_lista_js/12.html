<script>

let canvas = document.getElementById("meuCanvas");
let ctx = canvas.getContext("2d");

ctx.fillStyle = "blue";
ctx.fillRect(50, 50, 100, 50);

ctx.beginPath();
ctx.arc(200, 150, 30, 0, 2 * Math.PI);
ctx.fillStyle = "red";
ctx.fill();

ctx.fillStyle = "black";
ctx.font = "24px Arial";
ctx.fillText("Canvas!", 120, 250);

</script>
