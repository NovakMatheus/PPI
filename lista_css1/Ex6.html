<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f0f0;
}

.chat{
    width:450px;
    margin:20px auto;
    border:1px solid #ccc;
    background:#fff;
    padding:15px;
}

/* Nome */
.nome{
    color:gray;
    margin:5px 10px;
}

/* Mensagens */
.msg{
    position:relative;
    width:90%;
    min-height:70px;
    border:1px solid #ccc;
    border-radius:8px;
    padding:15px;
    margin-bottom:20px;
    clear:both;
}

.esquerda{
    float:left;
    background:white;
}

.direita{
    float:right;
    background:#d8ffd4;
    text-align:right;
}

.avatar{
    width:50px;
    height:50px;
    font-size:40px;
}

.esquerda .avatar{
    float:left;
    margin-right:10px;
}

.direita .avatar{
    float:right;
    margin-left:10px;
}

.texto{
    font-size:18px;
}

.hora{
    position:absolute;
    bottom:8px;
    right:10px;
    color:gray;
    font-size:12px;
}

/* Área de envio */
.enviar{
    clear:both;
    border:1px solid #ccc;
    border-radius:8px;
    padding:15px;
}

textarea{
    width:100%;
    height:90px;
    resize:none;
    font-size:18px;
    padding:10px;
}

button{
    float:right;
    margin-top:10px;
    padding:8px 15px;
    font-size:18px;
}
</style>

</head>
<body>

<div class="chat">

    <div class="nome">Pedro Silva</div>

    <div class="msg esquerda">
        <div class="avatar">👨</div>
        <div class="texto">Olá, tudo bem?</div>
        <div class="hora">00:50</div>
    </div>

    <div class="nome">Eu</div>

    <div class="msg direita">
        <div class="avatar">👩</div>
        <div class="texto">Estou bem sim, e você?</div>
        <div class="hora">00:55</div>
    </div>

    <div class="nome">Pedro Silva</div>

    <div class="msg esquerda">
        <div class="avatar">👨</div>
        <div class="texto">
            Vamos sair hoje? Sabe conversar e Lorem ipsum dolor sit amet
            consectetur adipisicing elit.
        </div>
        <div class="hora">01:01</div>
    </div>

    <div class="nome">Eu</div>

    <div class="msg direita">
        <div class="avatar">👩</div>
        <div class="texto">Criatura ....</div>
        <div class="hora">00:55</div>
    </div>

    <div class="enviar">
        <textarea placeholder="Digite sua mensagem"></textarea>
        <button>Enviar</button>
    </div>

</div>

</body>
</html>
