<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Buscador de Filmes</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
}

h1{
    text-align:center;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#results{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.movie{
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    text-align:center;
}

.movie img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:5px;
}

.movie h3{
    font-size:16px;
    margin:10px 0 5px;
}
</style>

</head>
<body>

<div class="container">

<h1>🎬 Buscador de Filmes</h1>

<div class="search-box">
    <input type="text" id="search" placeholder="Digite o nome do filme...">
    <button onclick="buscarFilmes()">Buscar</button>
</div>

<div id="results"></div>

</div>

<script>

const apiKey = "4a3b711b";
function buscarFilmes(){

    let query = document.getElementById("search").value;

    if(query === ""){
        alert("Digite um nome de filme!");
        return;
    }

    fetch(`https://www.omdbapi.com/?apikey=${apiKey}&s=${query}`)
        .then(response => response.json())
        .then(data => {

            let results = document.getElementById("results");
            results.innerHTML = "";

            if(data.Response === "False"){
                results.innerHTML = "<p>Nenhum filme encontrado.</p>";
                return;
            }

            data.Search.forEach(movie => {

                results.innerHTML += `
                    <div class="movie">
                        <img src="${movie.Poster !== "N/A" ? movie.Poster : 'https://via.placeholder.com/300'}">
                        <h3>${movie.Title}</h3>
                        <p><b>Ano:</b> ${movie.Year}</p>
                        <p><b>Tipo:</b> ${movie.Type}</p>
                    </div>
                `;

            });

        })
        .catch(error => {
            console.error("Erro:", error);
        });

}

</script>

</body>
</html>
