<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>

<style>
*{
    margin:0;
    box-sizing:border-box;
}

body{
    background:#2c3e50;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculadora{
    background:#1f2937;
    padding:20px;
    border-radius:15px;
}

#visor{
    width:100%;
    height:60px;
    margin-bottom:15px;
    font-size:28px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ecf0f1;
}

.botoes{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
}

button{
    height:60px;
    font-size:22px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#34495e;
    color:white;
}

button:hover{
    background:#4b6584;
}

.operador{
    background:#e67e22;
}

.operador:hover{
    background:#d35400;
}

.igual{
    background:#27ae60;
    grid-column:span 2;
}

.igual:hover{
    background:#219150;
}

.limpar{
    background:#c0392b;
}

.limpar:hover{
    background:#962d22;
}
</style>

</head>
<body>

<div class="calculadora">

<input type="text" id="visor" readonly>

<div class="botoes">

<button class="limpar" onclick="limpar()">C</button>
<button onclick="adicionar('(')">(</button>
<button onclick="adicionar(')')">)</button>
<button class="operador" onclick="adicionar('/')">/</button>

<button onclick="adicionar('7')">7</button>
<button onclick="adicionar('8')">8</button>
<button onclick="adicionar('9')">9</button>
<button class="operador" onclick="adicionar('*')">*</button>

<button onclick="adicionar('4')">4</button>
<button onclick="adicionar('5')">5</button>
<button onclick="adicionar('6')">6</button>
<button class="operador" onclick="adicionar('-')">-</button>

<button onclick="adicionar('1')">1</button>
<button onclick="adicionar('2')">2</button>
<button onclick="adicionar('3')">3</button>
<button class="operador" onclick="adicionar('+')">+</button>

<button onclick="adicionar('0')">0</button>
<button onclick="adicionar('.')">.</button>
<button class="igual" onclick="calcular()">=</button>

</div>

</div>

<script>

const visor = document.getElementById("visor");

function adicionar(valor){
    visor.value += valor;
}

function limpar(){
    visor.value = "";
}

function calcular(){

    const expressao = visor.value;
    const regex = /^[0-9+\-*/().\s]+$/;

    if(expressao === ""){
        return;
    }

    if(!regex.test(expressao)){
        visor.value = "Erro";
        return;
    }

    try{

        const resultado = eval(expressao);

        if(!isFinite(resultado)){
            throw new Error();
        }

        visor.value = resultado;

    }catch{

        visor.value = "Erro";

    }

}

</script>

</body>
</html>
