<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria Flexbox</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f3f3;
    font-family:Arial, Helvetica, sans-serif;
}

.galeria{
    width:90%;
    height:85vh;
    display:flex;
    gap:15px;
}

.card{
    flex:1;
    border-radius:40px;
    overflow:hidden;
    position:relative;
    transition:0.5s;
    cursor:pointer;
}

.card:hover{
    flex:6;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.info{
    position:absolute;
    bottom:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,0.35);
    padding:10px 15px;
    border-radius:15px;
}

.info h2{
    font-size:28px;
}

.info p{
    font-size:18px;
}
</style>

</head>
<body>

<div class="galeria">

    <div class="card">
        <img src="https://picsum.photos/id/1018/800/900" alt="Paisagem 1">
        <div class="info">
            <h2>Montanhas</h2>
            <p>Natureza e aventura</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/id/1015/800/900" alt="Paisagem 2">
        <div class="info">
            <h2>Lago</h2>
            <p>Paisagem tranquila</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/id/1016/800/900" alt="Paisagem 3">
        <div class="info">
            <h2>Floresta</h2>
            <p>Contato com a natureza</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/id/1025/800/900" alt="Paisagem 4">
        <div class="info">
            <h2>Praia</h2>
            <p>Fim de tarde</p>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/id/1039/800/900" alt="Paisagem 5">
        <div class="info">
            <h2>Deserto</h2>
            <p>Pôr do sol</p>
        </div>
    </div>

</div>

</body>
</html>
