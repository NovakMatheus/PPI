<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout com Flexbox</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}

/* Barra superior */
.topo{
    width:100%;
    height:80px;
    background:#242424;
    display:flex;
    align-items:center;
    padding-left:25px;
    gap:15px;
}

.bolinha{
    width:25px;
    height:25px;
    background:#3ec7c9;
    border-radius:50%;
}

/* Área principal */
.container{
    display:flex;
    width:100%;
    height:calc(100vh - 80px);
}

/* Navegação */
nav{
    width:23%;
    background:#f58a2c;
    color:white;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:20px;
}

/* Lado direito */
.principal{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* Cabeçalho */
header{
    height:60px;
    background:#45a9d9;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Conteúdo */
main{
    flex:1;
    background:#6553ad;
    color:white;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:20px;
}

/* Rodapé */
footer{
    height:60px;
    background:#3d9bc6;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

h2{
    font-size:14px;
}
</style>

</head>
<body>

<div class="topo">
    <div class="bolinha"></div>
    <div class="bolinha"></div>
    <div class="bolinha"></div>
</div>

<div class="container">

    <nav>
        <h2>NAVEGAÇÃO</h2>
    </nav>

    <div class="principal">

        <header>
            <h2>CABEÇALHO</h2>
        </header>

        <main>
            <h2>CONTEÚDO</h2>
        </main>

        <footer>
            <h2>RODAPÉ</h2>
        </footer>

    </div>

</div>

</body>
</html>
